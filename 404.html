<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page not found &middot; Rudranil Dutta</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0B0A09">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Libre+Caslon+Text:ital@0;1&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/case.css">
<style>
  .nf{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 22px;gap:0;}
  .nf-code{font-family:var(--mono);font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--gold-lit);}
  .nf-num{font-family:var(--display);font-weight:600;font-size:clamp(90px,18vw,190px);line-height:.9;color:var(--ivory);margin:18px 0 0;letter-spacing:-.02em;}
  .nf-rule{width:64px;height:1px;background:var(--gold);margin:30px 0;}
  .nf-say{font-family:var(--body);font-style:italic;font-size:clamp(17px,2.3vw,21px);color:rgba(240,230,210,.66);margin:0;max-width:34ch;line-height:1.55;}
  .nf-btn{
    margin-top:34px;font-family:var(--mono);font-size:11px;letter-spacing:2.4px;text-transform:uppercase;
    text-decoration:none;color:var(--gold-lit);border:1px solid rgba(201,162,75,.55);
    padding:16px 30px;border-radius:3px;transition:background .35s ease,color .35s ease,border-color .35s ease;
  }
  .nf-btn:hover{background:var(--gold);color:var(--obsidian);border-color:var(--gold);}
</style>
</head>
<body>
<main class="nf">
  <div class="nf-code">Error 404</div>
  <div class="nf-num">404</div>
  <div class="nf-rule"></div>
  <p class="nf-say">This one won&rsquo;t solve. Let&rsquo;s get you back to the work.</p>
  <a class="nf-btn" href="index.html">Back to the portfolio</a>
</main>
</body>
</html>
